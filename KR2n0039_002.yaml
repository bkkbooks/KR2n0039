body:
  text: 石經考卷下鄞縣萬斯同撰唐石經舊唐書文宗本紀開成二年冬十月癸卯宰臣判國子祭酒鄭覃進石壁九經一百六十卷時上好文覃以經議啓導稍折文章之士遂奏置五經博士依後漢蔡伯喈刋碑立於太學創立石壁九經諸儒校正訛謬上又令翰林勒字官唐𤣥度覆校字體又乖師法故石經立後數十年名儒皆不窺之以為蕪纍甚矣鄭覃傳鄭覃故相珣瑜之子以父䕃補𢎞文校理纍官京兆尹文宗即位改左散騎常侍三年以本官充翰林侍講學士四年四月拜工部侍郎覃長於經學稽古守正帝尤重之覃從容奏之曰經籍訛謬博士相沿難為改正請詔宿儒興學校定六籍凖後漢故事勒石於太學永代作則以正其闕從之九年十月屢遷尚書右僕射同平章事開成初奏起居郎周墀水部員外郎崔球監察御史張次宗禮部員外郎孔溫業等校定九經文字旋命上石覃以宰相兼判國子祭酒奏太學置五經博士各一人緣無職田請依王府官例賜祿粟從之又進石壁九經一百六十卷經籍志今字石經易篆三卷今字石經尚書五卷今字石經鄭𤣥尚書八卷今字石經尚書古篆三卷今字石經毛詩三卷今字石經儀禮四卷今字石經左傳古篆書十三卷今字石經左傳經十卷今字石經公羊傳九卷今字石經論語二卷蔡雍注新唐書鄭覃傳太和中覃以經籍刓謬博士淺陋不能正建言願與巨學鴻生共力讐刋凖漢舊事鐫石太學示萬世法詔可乃表周墀崔球張次宗孔溫業等是正其文刻於石藝文志今字石經易篆三卷今字石經尚書五卷今字石經鄭𤣥尚書八卷三字石經尚書古篆三卷今字石經毛詩三卷今字石經儀禮四卷三字石經左傳古篆書十二卷今字石經左傳經十卷今字石經公羊傳九卷蔡雍今字石經論語二卷按舊志有今字石經易傳三卷今字石經尚書五篆三卷今字石經左傳古篆書十三卷此不可解既言今字即今之楷書也何以又言易篆古篆及觀新志乃言三字石經尚書古篆三卷三字石經左傳古篆書十三卷始知舊志今字當改三字而新志今字石經易篆傳三亦當改為三字也京兆府學石經記黎持汲郡吕公龍圖領曹陜右之日持適承乏雍學一日謁公公喟然謂持曰京兆闤闠間有唐國子監存焉其間石經乃開成中鐫刻唐史載文宗時太學勒石而鄭覃與周墀等校定九經文字上石及覃以宰相兼祭酒於是進石壁九經一百六十卷即今之石經是已舊在務本坊自天佑中韓建築新城而六經石經本委棄於野至朱梁時劉鄩守長安有幕吏尹玊羽者白鄩請輦入城鄩方備岐軍之侵軼謂此非急務玊羽紿之曰一旦鹵兵臨城碎為矢口亦足以助賊為虐鄩然之乃遷置於此即唐尚書省之西隅也地雜民居其處窪下霖潦衝注隨立輒仆埋沒腐壤歲久折缺豫欲徙置於府學之北牖子且伻圖來視厥既視圖則命徒役凡石刻偃仆者悉輦置於其地東西陳列明皇注孝經及建學碑則立之中央顏禇歐陽徐柳之書逮偏旁字原之類則分布於庭之左右如入東序河圖洛書大璧琬琰爛然盈目先是有興平僧誕妄惑衆取索無厭大尹劉公希道沒入其資有欲請於朝以修慈恩浮圖者公即建言崇飾塔廟非古而興建學校為急朝廷乃以五百千畀之經始於元祐二年初秋盡孟冬而落成門序旁啓雙亭中峙廟廡回環不崇不卑誠故都之壯觀翰墨之淵藪也竊惟六經天人之道備聖人所以遺天下來世之意盡在於是自周末至隋千餘載之間已遭五厄道雖在無窮而器則有弊唯鑱之金石庶可以久有唐之君相知物之始終而憂後世之慮深故石經之立殆以此也然以洛陽蔡雍石經四十六碑觀之其始立也觀視摹寫者車乘日千餘兩填塞街陌可謂盛矣乃范蔚宗所見其存者才十有六枚餘皆毁壞磨滅然後知不得其人以護持雖金石之固亦難必其可久此吕公所以有功於聖人之經而不可不書也元祐五年歲次庚午九月壬戌朔二十日記按舊唐書文宗本紀及鄭覃傳皆言石璧九經即黎持之記亦然其實九經之外更有孝經論語爾雅凡十二經不止九經也較今之十三經但少孟子其時孟子尚雜諸子中未與大學中庸共列為四書也然此十二經之外張參之五經文字唐𤣥度之九經字樣與之並行歷五代宋元明迄今載祀九百而此刻一無損失則以吕公置諸學校之故也然漢魏石經亦在學校不及四百年殘毁殆盡則以洛陽帝都屢遭大亂長安自唐以後無建都者故反獲保全耳唐國子學石經顧炎武金石文字記周易二萬四千四百三十七字尚書二萬七千一百三十四字毛詩四萬八百四十八字周禮四萬九千五百一十六字儀禮五萬七千一百一十一字禮記九萬八千九百九十四字春秋左氏傳一十九萬八千九百四十五字公羊傳四萬四千七百四十八字榖梁傳四萬二千八十九字孝經二千闕百闕十三字論語一萬六千五百九字爾雅一萬七百九十一字張參五經文字唐𤣥度九經字樣九經並孝經論語爾雅字樣等都計六十五萬二百五十二字今在西安府儒學其未有年月一行題名十行曰開成二年丁巳歲月次于𤣥日維丁亥書石學生前四門館明經臣闕書石官將仕郎守潤州句容縣尉臣段絳校勘兼看書上石官將仕郎守祕書省正字臣柏嵩校勘兼看書上石官將仕郎守四門助教臣陳莊士覆定字體翰林待詔朝議郎權知沔王友上柱國賜緋魚袋臣唐𤣥度校勘官兼專知都勘定經書檢校刋勒上石朝議郎守國子毛詩博士上柱國臣章師道朝散大夫守國子司業騎都尉賜緋魚袋臣楊敬之都檢校官銀青光祿大夫闕國子祭酒同中書門下平章事太清宫使監修國史上柱國榮陽郡開國公食邑二千户臣覃官銜缺十字九經字樣云右僕射兼門下侍郎國子祭酒平章事覃按舊唐書開成元年正月中書門下奏起居舍人集賢殿學士周墀監察御史張次宗禮部員外郎孔溫業兵部員外郎集賢殿直學士崔球等同勘校經典釋文又云令率更令韓充詳定石經官新唐書六列墀等四人而碑並不載舊唐書文宗紀開成二年宰臣判國子祭酒鄭覃進石壁九經一百六十卷時上好文覃以經義啓導稍折文學之士遂奏置五經博士依漢蔡雍刋碑列於太學創立石壁九經諸儒校正訛謬上又令翰林勒字官唐𤣥度復校字體又乖師法故石經立後數十年名儒皆不窺之以為蕪纍甚矣舊史之評如此愚初讀而疑之又見新書無貶辭以為石壁九經雖不逮古人亦何據不賢于寺碑冡碣及得其本而詳校之乃知經中之謬戾非一而劉昫之言不誣也略識于左周易君子以裒多益寡裒誤作褒悔吝者言乎其小疵也言誤作存其孰能與于此哉脫于字周易繫辭下第八脫下字易窮則變變則通通則久是以自天祐之吉無不利下多一也字力小而任重小誤作少傷于外者必反其家其誤作於决必有所遇脫所字蠱則飭也飭誤作飾豐多故親寡旅也故下多一也字姤遇也姤誤作遘其與本文不同而兩通者終來有他吉他作它剛健篤實輝光輝作輝君子以治厯明時厯作歷可與佑神矣佑作祐其受命也如嚮嚮作響兼三才而兩之三才之道也才作材其一字而前後不同者包蒙包荒包承包羞繫于包桑繫辭下同包皆作苞包有魚包無魚以把包瓜包皆作包問以辨之由辨之不早辨也其辨明也明辨晳也辨吉凶者存乎辭困德之辨也井以辨義辨是與非辨皆作辨君子以類族辨物剝牀以辨君子以愼辨物居方復小而辨于物辨皆作辨其旁注者至靜而德方德下添一也字賁亨小利有攸往利下添一貞字其先誤而後改者略例筌誤作荃愈誤作喻二無誤作無皆即其誤改之其標題周易繫辭上第七周易繫辭第八周易說卦第九皆八分書而周易序卦第十周易雜卦第十一皆正書雖依古注附于第九之內以正書為别終似未妥尚書乃祖乃父丕乃告我高后曰作丕刑于朕孫乃父誤作先父孫上多一子字臣下罔攸稟令令誤作命若藥弗瞑眩藥誤作樂王乃狥師而誓狥誤作循乃汝世讐世誤作誓太保乃以庶敫攻位于洛汭攻誤作公用端命于上帝于誤作豫其與今文不同而兩通者敢對揚天子之休命無之字其旁注者豫有亂臣十人臣字旁注惟婦言是用是字旁注釋箕子囚封比干墓式商容閭干下容下各添一之字詩昔育恐育鞠鞠誤作鞫小戎序國人則矜其車甲甲誤作田舒懮受兮懮誤作憂豫尾翛翛翛誤作修戎車既飭飭誤作飾鞠為茂草鞠誤作鞫以祈黃耉祈誤作祁涼曰不可涼誤作諒鞠哉庶正鞠人忮慝鞠皆誤作鞫無此疆爾界界誤作介侯疆侯理疆誤作彊其與今文不同而兩通者雍雍鳴雁雍作雍之死矢靡他他作它不知我者謂我士也驕作不我知二章同和鸞雍雍雍作雍何人斯序故蘇公作是詩以絶之也以作而維塵雍兮雍作雍既匡既敇敇作敕其政不獲政從鄭箋作正尚不愧于屋漏愧作愧于彼西雍肅雍和鳴有來雍雍雍皆作雍屢豐年屢作婁其旁注者女雖湛樂從樂下添一克字自今以始歲其有下添一年字曰商是常商下添一王字其先誤而後改者抱衾與裯裯誤作稠不瑕有害瑕誤作遐鱣鮪發發發誤作撥噂沓背憎噂誤作蹲如彼遡風遡誤作訴駉駉牡馬牡皆作牧皆即其誤改之云何其旴脫其字添周禮女史八人史誤作使太宰三曰郊甸之賦郊誤作邦內饗豕盲視而交睫豕誤作施典枲掌布緦縷紵之麻草之物緦誤作絲牛人軍事共其犒牛犒誤作槁司市市司帥賈師而從賈誤作胥肆長掌其戒令令誤作禁鞮鞻氏府一人一誤作八鬯人禜門用瓢齎用誤作明司几筵設管筵紛純筵誤作席大司樂大㲈㲈誤作磬王大食三侑侑誤作宥大帥令奏鼓􅉧鼓誤作瞽大祝四曰禜禜誤作榮司常家各象其號象誤作相凡以神仕者仕誤作士小子史二人二誤作一大司馬旗居卒間居誤作車考工記妢胡之笴笴誤作笱矢人前弱則俯俯誤作勉其與今文不同而兩通者醫師疕瘍者疕上多一有字野廬氏有相翔者誅之誅上多一則字邦之大師大上多一有字庭氏以救日之弓與救月之矢射之射上多一夜字儀禮士冠禮捷柶興捷誤作建鄉射禮司射適堂西袒决袒誤作祖福髤橫而奉之奉誤作拳大夫與士射袒纁繻纁誤作熏燕禮右祭脯醢脯誤作酺大射儀賓升成拜拜誤作敗坐授瑟乃降授誤作受聘禮賓既將公事復見訝以其摯訝誤作之公食大夫禮陳鼎于碑南南面西上脫一南字覲禮天子賜舍曰伯父脫曰字士喪禮祭服不倒倒誤作到少牢饋食禮如筮日之儀儀誤作禮主婦被賜衣侈袂移誤作移下同祝延尸延誤作筵有司徹二手執挑七枋挑誤作桃主婦洗爵于房中脫爵字主婦北面答拜受爵尸降筵受主婦爵以降誤作受尸爵主人降洗爵爵誤作觶下主人實爵並同主人拜受爵尸拜送脫爵字其與今文不同而兩通者鄉射禮適左介中亦如之亦作皆燕禮小臣又請媵爵者二大夫螣爵如初大夫下更有大夫二字禮記御刪定月令在曲禮之前月令人乃遷徙徙誤作徒其器閎以奄奄誤作掩檀弓上周公蓋祔祔誤作附王制示弗故生也示誤作亦禮器饗帝于郊而風雨節寒暑時脫節字學記燕辟廢其學辟誤作譬喪大記甥子出寢門外脫外字子大夫公子衆士食粥脫衆士二字祭義父母愛之喜而弗忘喜誤作嘉哀公問如此則國家順矣脫則字坊記民猶薄于孝而厚于慈猶下多一有字中庸待其人而後行而誤作然君子之所不可及者脫之字緇衣有國家者章善􅓠惡脫家字儒行愼靜而尚寬脫而字大學人之其所親愛而辟焉五辟字皆誤作譬若有一個臣個誤作介其與今文不同而兩通者檀弓上有亡惡乎齊亡作無歲一漆之一作一樂記非聽其鑑鏘而已也鏘作鎗雜記上客立于門西于作於雜記下泄柳之母死泄作世喪大記命婦汜拜衆賓於堂上於作于主人先俟于門外于作於中庸可一言而盡也一作一問喪祭之宗廟以鬼享之享作饗大學堯舜帥天下以仁二帥字皆作率昏義祖廟既毁教于宗室于作於射義是以君臣以作故其先誤而後改者學記教人不盡其材材誤作才故人不耐無樂耐誤作能皆即其誤改之春秋左傳隱元年且告之悔且誤作具五年僖伯稱疾不從疾誤作侯十年伐戴戴誤作載桓二年故封桓叔于曲沃故誤作政六年楚之羸羸誤作嬴以類命為象類誤作德閔二年從曰撫軍軍誤作國僖三年公子友如齊涖盟涖誤作泣四年拜胙于公脫胙字姫置諸宫六日宫誤作公公殺其傅杜原欵傅誤作傳七年弗可改也已改誤作故十四年公怒止之止誤作上十五年輅秦伯輅誤作轄使郤乞告瑕吕飴甥且召之且誤作國二十五年昏而傅焉傅誤作傳二十七年責無禮也責誤作青郤縠可縠誤作榖三十一年晉新得諸侯新誤作親東傅于齊傅誤作傳三十三年入險而脫入誤作人為從者之淹淹誤作流文元年王使毛伯衛來錫公命錫誤作賜享江誤作芊二年廢六關關誤作闕七年置文公子焉焉誤作曰十二年太子以夫種與郕邽來奔邽誤作封宣二年晉趙盾弒其君夷臯弒誤作殺三年晉侯伐鄭及郔郔誤作延商紂暴虐紂誤作討十四年秋公如齊秋誤作利六年離卦誤畫作同人八年殺諸絳市絳誤作終十二年晉師在敖鄗之間師誤作帥十五年吾獲狄土土誤作士十七年盟于卷卷誤作巷郤子其或者欲已亂于齊乎乎誤作平十八年凡自虐其君曰弒虐上多一內字成二年及齊師戰于新築師誤作侯且辟左右且誤作旦七年尋蟲牢之盟蟲誤作蠱十七年楚公子櫜師襲舒庸櫜誤作橐襄十年子蟜曰蟜誤作嬌今伐其師今誤作令十四年士鞅反反誤作及十七年苟過華臣之門必騁騁誤作聘十九年而視不可含含誤作舍所不嗣事于齊者事誤作是天子令德天誤作夫二十一年欒盈過于周過上多奔楚二字二十三年邾畀我來奔畀誤作卑二十五年先夫當之矣夫誤作天井堙木刋堙誤作煙賦車兵徒卒甲楯之數卒誤作兵二十七年父子死余矣余誤作餘免餘復攻寧氏餘誤作余二十八年重兵之盟未可忘也忘誤作志使析歸父告晏平仲晏誤作宴文子使召之召誤作君慶氏之馬善驚馬誤作焉武王有亂臣十人脫臣字三十年蔡景侯為太子般娶于楚娶誤作聚單公子愆期期誤作旗駟帶追之駟誤作四昭元年今武猶是心也今誤作令二年齊使上大夫送之送誤作逆二年少姜有寵而死姜誤作齊知而復從復誤作弗四年恃險與馬馬誤作焉五年娶于子尾氏娶誤作聚君若歡焉好逆使臣若誤作苦九年無囿猶可囿誤作宥十三年隱太子之子廬歸于蔡廬誤作盧十四年楚子使然丹簡上國之兵于宗丘宗誤作宋二十年余不忍其詬詬誤作詢取人于萑苻之澤苻誤作符二十一年心是以感憤感實生疾感誤作咸二十二年士平出奔楚士誤作氏邊邛為大司徒邛誤作印二十五年季公鳥生申申誤作甲二十七年入于堀室堀誤作􅀈定元年榮駕鵝駕誤作駕三年及邾子盟于拔拔誤作技八年子姑使溷代子代誤作伐十年駟赤謂侯犯曰赤誤作亦哀四年盜殺蔡侯申殺誤作弒蔡昭侯將如吳蔡誤作葬十六年與晉人謀襲鄭晉誤作為二十三年有不腆先人之産馬馬誤作焉二十六年四方其訓之訓誤作順其與今文不同而兩通者宣二年以視諸朝視作示哀十六年此事克則為卿事下有也字其續添者昭二十二年辛丑伐京毁其西南下添子朝奔郊四字春秋公羊傳隱元年何以名字也字上多一不字二年婦人謂嫁曰歸嫁誤作稼三年曷為或言崩或言薨脫上一或字生毋相見死毋相哭毋字並誤作母死毋誤作毋死六年吾與鄭人末有成也末誤作未下同十年宋人蔡人衛人伐載載誤作戴桓二年曰有有則此何以書脫一有字隱賢而桓賊也賊誤作賤莊十九年此其言遂何脫其字二十五年求乎隂之道也隂誤作隱三十二年狄伐邢邢誤作刑僖四年南夷與北狄交誤作北夷六年此其言圍何圍下多一者字二十六年乞師者何脫師字三十年歸惡乎元咺也乎誤作于三十三年百里子與蹇叔子百誤作伯文四年其謂之逆婦姜于齊何何誤作河宣十五年然後歸爾爾誤作耳成十五年成公幼幼誤作憂臧宣叔者相也叔誤作公襄十四年邾婁人于戚脫人字十七年春王二月二誤作三十九年為其驕蹇為誤作或二十九年許人子者必使子也人下脫子字昭九年其言陳火何脫陳字定元年立煬宫誤作公四年而憂中國而誤作其哀四年盜殺蔡侯申殺誤作弒六年齊國夏及高張來奔高上多一齊字十四年顏淵死子曰子上多一孔字其與今文不同而兩通者隱四年隱公曰否作隱曰吾否桓六年簡平徒也徒作馬淫乎蔡乎作于十一年蔡仲者何鄭相也相上有之字文六年何以謂之天無是月非常月也是月下更有是月二字宣六年此非弒君而何而誤作如十年未絶於我也於作于十二年是以君子篤於禮而薄於利下於作于成二年得一貶焉爾一作一襄十二年春王正月正作三二十九年爾殺吾君殺作弒三十一年於是負孝公之周訴天子訴作訴十四年有麏而角者麏作麕其先誤而後改者桓二年此其目言之何目誤作月閔元年盍弒之矣使弒子般弒並誤作殺僖十三年葬陳宣公宣誤作桓成二年及齊侯戰于鞍侯誤作師昭二十五年慶子免君於大難矣脫矣字皆即其誤改之春秋榖梁傳隱元年父者何傅也傅誤作傳四年弒而代之也代誤作伐九年所俠也俠誤作挾莊七年則是雨說也雨誤作兩下同僖五年天子世子世天下也誤作士子二十二年春秋三十有四戰脫有字二十八年晉侯齊師宋師秦師誤作齊侯文二年內大夫可以㑹外諸侯脫外字三年王子虎卒誤作壬子宣八年以譏乎宣也譏誤作饑襄元年晉侯使荀罃來聘罃誤作嬰二年三年同三年諸侯始失正矣正誤作王六年立異姓以涖祭祀立上多一非字哀元年此該之變而道之也該誤作郊六者入者內弗受也弗誤作不下同其與今文不同而兩通者僖十七年桓公嘗有存亡繼絶之功脫公字文六年處父主境上事事上多一之字成五年率羣臣而哭之前作率後作帥其先誤而後改者甚多不具載論語賜也爾愛其羊爾誤作女不知其仁仁誤作人子使漆雕開仕雕誤作雕再斯可矣斯誤作思三人行三上多一我字必有我師焉有誤作得冉有子貢侃侃如也有誤作子告夫三子三上多一二字可與言而不與之言脫之字稱諸異邦曰寡小君諸誤作謂何德之衰下多也字其與今文不同而兩通者女得人焉爾乎爾作耳人潔已以進潔誤作潔其先脫而後添注者陽貨篇子曰巧言令色鮮矣仁爾雅替戾底廢誤作底砥翿纛也翿誤作翢皇華也誤作華皇赫兮咺兮咺誤作烜是刈是濩濩誤作穫木謂之虡木誤作本何鼓謂之牽牛何誤作河澤烏蘾蘾誤作薞莩麻母莩誤作茡穫橐含穫誤作攫柷州木柷誤作祝魚尾謂之丙尾上添一之字燕白脰鳥鳥誤作烏楊鳥白鷢楊鳥誤作鸉鳶鳥醜鳥誤作烏鳥鵲醜鳥誤作烏􅕱大􅕱誤作大麕凡經中虎字皆缺末筆作字皆同避太祖諱淵字皆缺筆作姻亦作避祖諱世字皆缺筆作丗泄作泄紲作絏棄作弃勩作葉作㳿皆改從云民字皆缺筆作氓作氓岷作㞴汦昏緍碈痻皆改從氏避太宗諱亨字皆作避肅宗諱豫字皆缺筆作避代宗諱適字皆缺筆作適避德宗諱誦字皆缺筆作避順宗諱純字皆缺筆作避憲宗諱恆字皆缺筆作恆避穆宗諱湛字皆缺筆作椹作椹作避敬宗諱乃若髙宗諱治中宗諱顯睿宗諱旦𤣥宗諱隆基文宗諱涵皆不缺筆者禮天子事七廟自肅宗至敬七廟而高祖太宗創業之君不祧者也𤣥宗以上則祧廟也故不諱文宗則今上也古者卒哭乃諱故生不諱左傳文公宣公卷字更濫惡而成城字皆缺末筆榖梁襄昭定哀四公卷儀禮士昏禮皆然此為朱梁所補刻考之宋劉從乂黎持二記但言韓建劉鄩移石而不言補刻宋建隆三年劉從乂修文宣王廟記言天祐甲子歲太尉許國公為居守移太學並石經于此甲子歲昭宗遷雒之年許國公者韓建也元祐五年黎持新移石經記則云舊在務本坊自天祐中韓建築新城而石經委弃于野至朱梁時劉鄩守長安從幕吏尹玉羽之請輦入城中置于此地即唐尚書省之西隅也今龍圖吕公領漕陜右以其處窪下命徙置于府學之北墉而建亭焉二說不同軍朱彛尊曰尹玉羽者京兆長安人以孝行聞劉鄩辟為保大節度推官歷雍汴滑兖從事仕後唐至光祿少卿晉髙祖召之辭以老退歸關中嘗著自然經五卷武庫集五十卷其事散見于冊府元龜惜歐陽子不為之立傳而其書遂亦不傳之于世也然成字缺筆其為梁諱無疑昔人固未嘗遍讀而博考也詳見鎮東軍牆隍廟記下五經文字三卷凡一百六十部三千二百三十五字大厯十一年國子司業張參以說文字林兼采漢石經著為定體按劉禹錫國學新修五經壁記曰大厯中名儒張參為國子司業始詳定五經書于論堂東西廂之壁辨齊魯之音取其宜考古今之文取其正繇是諸生之師心曲學偏聽臆說咸束而歸于大同積六十載崩剝汙衊泯然不鮮今天子尚文章尊典籍國學上言遽賜千萬時祭酒皞博士公肅遂以羡贏再新壁書懲前土塗不克以壽乃折堅木負牗而比之其製如版牘而高廣其平如粉澤而潔滑背施隂關使衆如一附離之際無迹而尋堂皇靚深兩屋相照申命國子能通書法者分章揆日懸其業而繕寫焉此文當作于太和年間自土塗而木版自木版而石壁凡三易矣乃今石刻其末曰乾符三年孫毛詩博士自牧以家本重校勘定七月十八日書刻字人魚宗㑹其字别體與朱梁所刻相類而本文不然當是開成中所刻其中有磨改數字者意自牧所為也九經字樣一卷凡七十六部四百二十一字國子監奏覆定石經字體官翰林待詔度𤣥度狀准太和七年十二月二十五日敕覆定九經字體者今所詳覆多依司業張參五經文字為准其舊字樣歲月將久㸃畫參差傳寫相承漸致乖誤今並依字書參詳改正諸經之中别有疑闕舊字樣未載者古今體異𨽻變不同如總據說文即古體驚俗若依近代文字或傳寫乖訛今與校勘官同商較是非取其適中纂録為新加九經字樣一卷請附于五經字樣之末奉勑宜依開成二年八月十二日中書門下牒蜀石經後蜀主本紀吳任臣十國春秋廣政十四年詔勒諸經于石祕書郎張紹文寫毛詩儀禮禮記祕書省校書郎孫明古寫周禮國子博士孫逢吉寫周易校書郎周德政寫尚書簡州平泉令張德昭寫爾雅字皆精謹母昭裔傳母昭裔河中龍門人後主時拜左僕射同中書門下平章事性好藏書酷嗜古文精經術嘗按雍都舊本九經命張德昭等書之刻石于成都學宫蜀土自唐末以來學校廢絶昭裔出私財營立黌宫且請後主鏤板印九經由是文學須盛成都府學石經堂圖籍記席益蜀儒文章冠天下其學校之盛漢稱石室禮殿近世則石壁九經今皆存焉自考景帝時太守文翁始作石室至東漢興平元年太守高昳作周公禮殿于石室東圖畫邃古以來君臣聖賢然亦有魏晉名流以故世傳西晉太康中刺史張收始畫非也殿有畫自高昳始逮收嘗增益之今壁間又有東晉人士蓋收之後繼有畫者不知誰氏也齊永明十年刺史劉悛益以禮家器服制度僞蜀廣政七年其相母昭裔按雍都舊本九經命平泉令張德昭書而刻諸石本朝因禮殿以祀孔子為宫其旁置學宫弟子講習傳授故蜀帥尚書右丞胡公宗愈作堂于殿之東西隅以貯石經益之先人鎮蜀奏秩文翁高昳于祀典又請樂工于朝教士以雅聲而後頖宫之禮樂文物粹然近古自國家三雍之外無與比者鄉者中州陸沈惟蜀賴天子神聖威武得保生聚邑屋而吏視軍賦為急春秋釋奠守者不親行敕下吏攝事以故風雨鳥鼠之虞不至黌舍蓋自東漢興平元年歲在甲戌始作禮殿逮我宋紹興六年丙辰歷年六百七十有三其間僞蜀刻石經之歲是為晉開運甲辰至是一百九十三年矣益實受命盡護全蜀兼行太守事兹歲八月陬日在丁羣文學藏儀吏以不圯板築之功雖垂軒皇之衣裳舞有虞之干羽自當功成于理外如其不然則伏湛行鄉射于東京征伐之間王導興學校于江左草創之始是真迂濶矣或者聞此而猶未喻吾將賦子襟之三章悲原氏之將落也尚友君子者如此心哉紹興七年記石經始末記范成大石經已載前記朝子正作考異而為之序考異之作大抵以監本參校互有得失其間顛倒缺訛所當辨正然古今字畫雖小不同而實通耳考異並序凡二十一碑具在石經堂中子正之序曰鴻都石經自遷徙鄴雍遂茫昧于人間至唐太和中復刋十二經立石國學而長興中詔國子博士田敏與其僚校諸經鏤之板故今世六經之傳獨此二本爾按趙清獻公成都記僞蜀相母昭裔捐俸金取九經琢石于學宫而或又云母昭裔依太和舊本令張德釗書國朝皇祐中田元均補刻公羊高榖梁赤二傳然後十二經始全至宣和間席文獻又刻孟軻書參焉今攻之僞相實母昭裔也考經論語爾雅廣政甲辰歲張德釗書周易辛亥歲楊鈞遜逢吉書尚書周德正書周禮孫朋古書毛詩禮記儀禮張紹文書左氏傳不志何人書而詳觀其字畫亦必為蜀人所書然則蜀之立石蓋十經其書者不獨德釗而能盡用太和本固已可嘉凡歷八年其石千餘昭裔獨辨之尤偉然也公武異時守三榮討國子監所模長興板本讀之其差誤蓋多矣昔議者謂太和石本授寫非精時人弗之許而世以長興板本為便國初遂頒布天下收向日民間寫本不用然有訛舛無由參校判知其謬猶以為官既刋定難于獨改由是而觀石經固脫錯而監本亦難盡從公武至少城寒暑一再易節暇日因命學宫讐校之石本周易說卦乾健也以下為韓康伯注略例有邢璹注禮記月令從唐李林甫改定者監本皆不取外周易經文不同者五科尚書十科毛詩四十七科周禮四十二科儀禮三十一科禮記三十二科春秋左氏傳四十六科公羊傳二十一科榖梁傳一十三科孝經四科論語八科爾雅五科孟子二十七科其傳注不同者尤多不可勝記獨計經文三百二科迹其文理雖石本多誤然如尚書禹貢篇雲夢工作乂毛詩日月篇以至困窮而作是詩也左氏傳昭公十七年六物之占在宋衛陳鄭乎論語述其篇舉一隅而示之衛靈公篇敬其事而後食其祿之類未知孰是先儒有改尚書無頗為無陂改春秋郭公為郭郭者世皆譏之此不敢决之以臆姑酌存之亦鐫諸樂石附于經後不誣將來必有能考而正之者焉子正又刻古文尚書于堂而為之序曰自秦更先代法制以來凡曰古者後世寥乎無聞書契之作固始于伏羲然變狀百出而不彼之若者亦已多矣尚書一經獨有古文在豈非得于壁間以聖人舊藏而天地亦有所護不忍使之絶晦中間雖遭漢巫蠱唐天保之害終不能滅蝕今猶行于人間者豈無謂耶况孔氏謂尚書以其上古之書也當時科斗既不復見其為𨽻古定此實一耳雖然聖人遠矣而文字間可以概想則古書之傳不為浪設豫邸少城作石經考異之餘因得此古文全編于學宫乃延士張倣吕氏所鏤本再刻諸石是不徒文字足以貽世若二典曰若粵樂之類學者可不知歟嗚呼信而好古學于古訓乃有獲蓋前牒所令方將配孝經周易經文之古者同附于石經之列以故弗克第述一二以示後之好識奇字者安知世無揚子雲時乾道庚寅仲夏望日序石經周易周易略例共十三卷朝公武讀書志此僞蜀廣政辛亥孫逢吉書廣政孟昶年號也說卦乾健也以下有韓康伯注略例有邢璹注此與國子監本不同者以蜀印本較邢璹注略例不同者又百餘字其意義似石經誤以無他本訂正姑兩存焉按辛亥廣政十三年也當周太祖廣順元年石經尚書十三卷此僞蜀周德真書經文祥字皆缺其畫亦缺民字之類蓋孟氏未判唐時所刻也以監本較之禹貢雲土夢作乂倒上夢字盤庚若網在綱皆作網字沈括筆談曰雲土夢作乂太宗時得古本因改正以網為綱未知孰是按蜀中石經皆廣政中所刻朝氏既知易經刻于廣政何言書經刻于孟氏未判時耶豈知祥自諱其名子昶反不當諱父名耶宋史田敏傳言唐明宗命敏較刻五經敏私智自用改若網在綱為綱在綱則蜀中所刻固用田氏監本也石經毛詩二十卷此僞蜀張紹文書與禮記同時刻石石經周禮十二卷此僞蜀孫朋古書以監本是正其注或羡或脫或不同至千數石經禮記二十卷此僞蜀張紹文所書不載年月經文不缺唐諱當是孟知祥僭位之後也首之以月令題云御刪定蓋明皇也林甫等注蓋李林甫也其餘篇第仍舊議者謂經禮三百典禮三千毋不敬一言足以蔽之故先儒以為首孝明肆情變亂甚無謂也石經左氏傳三十卷此不題所書人姓氏亦無年月按文不缺唐諱而缺祥字當是孟知祥僭位後刻石也石經論語十卷右僞蜀張德鈞書缺唐諱立石當在孟知祥未叛之前其文脫兩字誤一字述而第七舉一隅下有而示之三字三人行必有我師焉上又有我字衛靈公第十五敬其事而後其食作後其祿與李鶚本不同者此也宋石經宋史趙克繼傳趙克繼秦王廷美曽孫善楷書尤工篆𨽻仁宗時詔與朝士分𨽻石經仕至定武軍節度觀察留後諡章靖宋史謝飶傳謝飶字不疑丹陽人舉進士為上元主簿㑹國子監立石經以飶善𨽻召為直講終龍圖閣學士宣和書譜章友直傳章友直字伯益閩人工玉箸篆法嘉祐中與楊南仲篆石刻于國子監時人稱之宋史藝文志楊南仲石經七十五卷金史劉彥宗傳天㑹中大舉侵宋劉彥宗謂宗翰尼堪宗望幹里雅布曰昔蕭何入關秋毫無犯惟收圖籍遼太宗入汴載路車法服石經以歸皆令則也二帥納之按宋大石經不大彰于世或疑其未必成書然考趙克繼謝飶章友直諸傳明載其事而藝文志又言楊南仲石經七十五卷則此書業已告竣何當時稱述者寥寥耶觀金史劉彥說二帥語意者此石經果為金人攜去耶夫唐之石經時譏其蕪纍而至今猶存宋之石經出諸明人之手必有可觀而反不獲傳于世豈不深可惜哉唐石經止楷書一體其石刻在今西安府學宋石經集當時善篆𨽻者分書必用篆𨽻二體乃後人皆不獲見而金人亦鮮有言及者豈此刻遭汴京之覆竟毁壞無餘耶又按漢魏石經俱在洛陽其後由洛陽遷鄴下由鄴下遷長安無在汴梁者况至唐時損壞已盡安得石晉時尚在若唐之石經刻在長安至今完好亦未始移至汴不知德光所移者何物也豈彥宗但得之傳聞未嘗實有其事耶或所載者乃他石刻而非石經耶且汴梁之建都始自朱梁有國日淺唐滅梁徙都于洛晉篡唐復都于汴僅十二年而亡汴原非帝王舊都而石經實在其地則彥宗之說二帥千古美談其事猶在疑似之間也石經公羊傳十二卷朝公武讀書志皇朝田况皇祐初知成都日刻石國史藝文志云僞蜀刻立五經備注傳為世所稱以此觀之不應無公榖豈初有之後散毁耶石經榖梁傳十二卷此傳後不載年月及所書人姓氏按文不缺唐及僞蜀諱而缺恆字以故知刻石當在真宗之後意者亦是田况也石經孟子十四卷皇朝席旦宣和中知成都刋石置于學宫云僞蜀時刻六經于石而獨無孟子經為未備夫經大成于孔子豈有闕耶其論既謬又多誤字如以嚬顣為類不可勝記元史申屠致遠傳世祖至元中為杭州總管府推官西僧楊璉真伽作浮屠于宋故宫欲取高宗所書九經石刻以築基致遠力拒之乃止續通鑑綱目至元二十五年二月毁宋故宫為佛寺蓋從僧格及嘉木揚喇勒智言凡宋宫殿郊廟悉毁為寺復欲取宋高宗所傳九經石經為浮屠基推官申屠致遠力拒止之薛應旗續資治通鑑王宗沐宋元通鑑並同杭州府志藝文志金石刻類石經宋高宗御書雜志高宗嘗御書六經賜國子監又以石本賜諸州學校翰墨稍倦即命吳憲續書人莫能辨石經唐明皇孝經注一卷陳振孫書録解題此今世所行本始刻石太學御八分書末有祭酒李齊古所上表及答詔具宰相銜名實天寶四載號為石臺孝經乾道中蔡洗知鎮江以其本授教授沈必豫熊克使刻石學宫云石刻佛經記附天保二年朱彛尊太原縣之西五里有山曰風峪風峪之口風穴在焉相傳神至則穴中肅然有聲風之所從出也愚者捧土塞穴建石佛于內環列所刻佛經凡石柱一百二十有六積歲既久虺蝎居之雖好遊者勿敢入焉丙午三月豫至其地率土人燎薪以入審視書法非近代所及徘徊久之惜皆掩其三面而未獲縱觀其全也由唐以前書卷必事傳寫甚者編韋續竹截蒲緝柳而浮屠之言亦惟山花貝葉綴集成文學者于時窮年筆札不能聚其百一難矣石經肇自蔡雍歲久淪缺至唐鄭覃周墀復勒于京兆後唐長興中始更傳寫為雕印舍至難而就至易由是書籍日以盛顧世之學者忽其易反或束而不觀何歟豈其所謂日盛者乃其所以衰歟北朝之君臣崇奉釋氏故石刻經像在處多有豫友太原傅山行平定山中誤墜巖谷見洞口石經林列與風峪等皆北齊天保間字而房山石經刻之自隋甚矣其法之蕃熾也今佛宫所棲少者百人多至數千然通其㫖者率以語言文字為無用見講說佛經往往鄙置不屑嗚呼佛之說雖戾于聖人之言要皆彼國中之先生長者也既用其法棄其先生長者之言果何如哉九經之文存西安府學儒者雖不盡觀而得之者咸知愛惜至風峪所藏其徒雖繁莫不顧焉者矣是則釋氏之無人不尤甚于吾道之衰也夫傅山聞之曰然遂書以為記板刻之始附後唐明宗長興中詔國子博士田敏與其僚較諸經鏤之板朝公武石經考異子嘗討國子監所模長興板本讀之其差謬蓋多矣昔記者謂太和石經授書非精時人弗之許世以長興板本為便國初遂頒布天下收向日民間寫本不用然有舛訛無由參較判知其謬猶以為官既判定難于獨改由是而觀石經固脫錯而本亦難盡從也宋史田敏傳田敏鄒平人後唐天成中官屯田員外郎兼太常博士奉詔與馬鎬等同校九經歷仕周晉漢周至少博工部尚書致仕卒于宋開寶四年敏初仕湖南路出荆渚以印本經書遺髙從誨從誨謝曰祭酒所遺書僕但能讀孝經耳敏曰讀書不必多十八章足矣因舉諸侯章諷之從誨大慙敏雖讀于經學亦好穿鑿所校九經頗以獨見自任如改尚書盤庚若網在綱為若綱在綱爾雅椵木槿注曰日及改為面及如此類甚衆世頗非之趙明誠石經録後唐汾陽王真堂記李鶚書鶚五代時仕為國子丞九經印板多其所書前輩頗貴重之余後得此記其筆法蓋出歐陽率更然窘于法度而韻不能高非名筆也陳振孫書録解題五經字樣一卷唐沔王友翰林待制唐𤣥度撰以補張參之缺者豫昔宰南城出謁有持故紙粥于道右乃古京本五代開運丙午所刻也晉出帝開運三年遂為家藏書籍之最古者宋史藝文志周顯德中始有經籍板刻學者無筆札之勞獲睹古人全書十國春秋母昭裔傳母昭裔仕後蜀為左僕射同平章事性嗜藏書精經術常按雍都舊本九經命張德釗書之刻石于成都學宫蜀土自唐末以來學政廢絶昭裔出私財營學宫立黌舍請後主鏤板印九經由是文學復盛又令門人句中正孫逢吉書文選初學記白氏六帖刻板行之後蜀平子守素齊至中朝諸書遂大彰于世五代史補云昭裔微賤時借文選于友人其人有難色昭裔遂憤曰異日若貴當鏤板行之後果踐其言按五經之鏤板宋史謂始于周顯德不知唐長興晉開運已先有之世言馮道始鏤板官鬻于市蓋射利也其射利未可知而創始之功實被于萬世獨怪秦漢以來其文字已知刻石何故不知鏤板然自鏤板之後書籍日多人以其得之易也反置之不觀而淫詞蕪說不可傳世者亦率災我梨棗此又板刻之害也石經考卷下
