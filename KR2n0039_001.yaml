body:
  text: 石經考卷上鄞縣萬斯同撰漢石經後漢書靈帝本紀熹平四年春三月詔諸儒正五經文字刻石立於太學門外蔡雍傳蔡雍字伯喈陳留圉人靈帝時召拜郎中校書東觀遷議郎雍以經籍去聖久遠文字多謬俗儒穿鑿疑誤後學熹平四年乃與五官中郎將堂溪典光祿大夫楊賜諫議大夫馬日磾議郎張馴韓説太史令單揚等奏求正定六經文字許之雍乃自書丹於碑使工鐫刻立於太學門外於是後儒晚學咸取正焉碑始立觀視及摩寫者車乘日千餘輛填塞街陌資治通鑑同儒林傳自太初後質帝年號遊學增廣太學至三萬餘生然章句漸踈多以浮華相尚儒者之風益衰黨人既誅其高名善士多坐流廢後遂至忿爭更相言告亦有私行金貨定蘭臺漆書經字以合私文熹平四年靈帝乃詔諸儒正定五經刻於石碑為古文篆𨽻三體書法以相參校樹之學門使天下咸取則焉注古文謂孔子壁中書篆秦始皇使程邈所作𨽻亦程邈所獻主於徒𨽻從其簡易也張馴傳張馴字子俊定陶人辟公府舉高第拜議郎與蔡雍共奏定六經文字擢侍中終大司農李巡傳見宦官吕強傳李巡汝陽人靈帝時為宦官與濟隂丁肅下邳徐衍南陽郭耽北海趙祐稱為清志皆在里巷不爭威權巡以諸博士試甲乙科爭第高下更相告言至有行賂定蘭臺漆書經字以合其私文者乃白帝與諸儒共刻五經文於石於是詔蔡雍等正其文字自後五經一定爭者用息洛陽記陸機太學在洛城南開陽門外講堂長十丈廣二丈堂前石經四部碑凡四十六枚西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉毁東行論語三碑二碑毁禮記碑上有諫議大夫馬日磾議郎蔡雍名按東漢時五經立學官者易則施孟梁丘京四家書則歐陽大小夏侯三家詩則齊魯韓三家三禮但用儀禮有大小戴二家春秋但用公羊有嚴顏二家他若古文尚書毛氏詩左氏春秋小戴氏禮記後世頒之學宫者皆不立學官此石碑所刻書用伏生今文孔穎達正義蔡雍所刻石經尚書止經文三十四篇春秋用公羊傳宜也禮記不立學官何以得與諸經並刻及考洪氏石經殘碑有儀禮而無禮記乃知洛陽記之誤且記不言詩經而洪氏書及隋經籍志有魯詩六卷則是此記所遺而石碑之殘毁當不止二十有九矣且五經之外更有論語又用古文篆𨽻三體度非四十六碑所能盡考楊衒之洛陽伽藍記言諸碑表裏皆書始得其實然當陸機時曹魏石經久已立漢碑西此記何以不及足知陸氏之疏漏而伽藍記之言不參觀也魏石經晉書衛恆傳衛恆字巨山安邑人太保瓘子仕至黃門郎嘗作四體書勢言魏正始中立三字石經三國魏志不言立石經事故採晉書補之後魏書江式傳江氏字法安代人纍官符節令宣武延昌三年上疏請正定文字言魏初邯鄲淳善倉雅許氏字指八體六書精究間理以書教諸皇子又建三字石經於漢碑西其文蔚煥三體復宣胡三省通鑑注曰魏碑以正始年中立漢書言元嘉元年度尚命邯鄲淳作曹娥碑時淳已弱冠自元嘉至正始九十餘年謂淳所書非也按晉書裴頠傳惠帝時頠為侍中時天下暫寧奏修國學刻石寫經是晉亦有石經矣然後人從無言及者豈有其議而未竣厥事耶觀漢世石經創始於熹平四年乙卯告成於光和六年癸亥實歷九年之久則當裴公時昏主尸位海內大亂其事之未成可知矣水經注酈道元漢靈帝光和六年刻石鏤碑載五經立於大學講堂前悉在東側蔡雍以熹平四年與五官中郎將堂溪典光祿大夫碑議郎張訓漢書光祿大夫馬日磾議郎張訓韓説太史令單揚等求正定六經文字靈帝許之雍乃自書册於碑使工鐫刻立於太學門外於是後儒晚學咸取正焉碑始立觀視及筆寫者車乘日千餘兩填塞街陌今碑上悉銘刻蔡雍等名魏正始中又立古篆𨽻三字石經魏初傳古文出邯鄲淳石經古文轉失淳法樹之於堂西石長八尺廣四尺刻石於其下碑石四十八枚廣三十丈魏文帝又刋典論六碑附於其次陸機言太學贊别一碑在講堂西下列石龜碑載蔡雍韓説棠溪典等名太學弟子贊復一碑在外門中今二碑並無按正始乃魏廢帝年號廢帝乃文帝之孫此言文帝又刻典論六碑甚謬若言又刻文帝典論六碑則當矣洛陽伽藍記楊衒之開陽門御道東有漢國子學堂堂前有三種字石經二十五碑表裏刻之寫春秋尚書二部作篆科斗𨽻三種字漢右中郎將蔡雍遺迹也猶有十八碑餘皆殘毁復有石碑四十八枚亦表裏𨽻書寫周易尚書公羊禮記四部又讚學碑一並在講堂魏文帝作典論六碑至太和十七年猶有四存高祖題為勸學里武定四年大將軍遷石經於鄴按洛陽記漢石經止存十七碑餘二十九碑盡毁此在晉世已然何以至魏末尚存二十五碑然此乃楊公所目覩語必不誣愚意二十五當是十五之訛蓋比晉時又損二碑矣其言猶有十八碑餘皆殘毁亦不可解上言二十五碑已非安得又有十八碑愚意餘字當衍謂尚有十八碑悉殘毁不全爾下言四十八碑則是曹魏所刻與水經注所言正合無可疑也後魏書崔光傳崔光字長仁清和人仕至太保明帝神龜元年疏言石經之作始自炎劉雖纍經戎亂猶未大崩浸聞往者刺史臨州多構圖寺官私顯隱漸加剝落由是經石彌減文字增缺今求遣國子博士一人堪任幹事者專主周視禁驅田牧制其踐穢料閲碑牒所失次第量為補綴詔曰此乃學者之根源不朽之永格便可一依公表光乃令國子博士李郁與助教韓神固劉燮等勘校石經其殘缺計料石功並字多少欲修補之後靈太后廢遂寢後魏帝書考靜帝本紀武定四年八月移洛陽漢魏石經於鄴資治通鑑同北齊書文宣帝本紀天保元年八月詔郡國修立黌序廣延髦俊敦述儒風其國子學生亦依例銓補服膺師説研習禮經往者文襄皇帝所建蔡雍石經五十二枚即宜移置學館依次修立按漢石經原止四十六碑北齊何以有五十二碑蓋并魏石經數之爾然魏碑四十八益以漢碑十有五當得六十三枚而止於五十二者由河陽岸崩淪沒於水故也載考隋經籍志言齊神武遷經於鄴此歸之文襄者神武以武定五年正月殂而遷經在四年八月其命本出於神武是時大舉攻玊璧諸務未遑至文襄始行其事故高洋歸之其兄而通鑑亦因之也張潮曰五十二碑當是並典論六碑而數之耳周書宣帝本紀大象元年二月詔徙鄴城石經於洛陽資治通鑑同隋書劉焯傳劉焯字士元信都人仕至太學博士開皇六年運洛陽石經至京師奉敕與劉炫等考定隋書經籍志後漢鐫刻七經著於石碑皆蔡雍所書魏正始中又立一字石石經相承以為七經正字後魏之末齊神武執政自洛陽徙於鄴都行至河陽值岸崩遂投於水其得至鄴者不及大半至隋開皇六年又自鄴京載入長安置於祕書內省議欲補綴立於國學尋屬隋亂事遂寢廢營造之司因用為柱礎貞觀初祕書監臣魏徴始收聚之十存其一其相承傳拓之本猶在祕府並秦帝刻石附於此篇以備小學一字石經周易一卷梁有三卷一字石經尚書六卷梁有今字石經鄭氏尚書八卷亡一字石經魯詩六卷梁有毛詩三卷亡一字石經儀禮九卷一字石經春秋一卷梁有二卷一字石經公羊傳九卷一字石經論語一卷梁有二卷一字石經典論一卷三字石經尚書九卷梁有十三卷三字石經尚書五卷三字石經春秋三卷梁有十三卷按漢靈帝光和六年癸亥至魏廢帝正始元年庚申止五十八年石經應未毁魏人何故復刻豈董卓焚洛陽宫殿太學亦被焚並石經延及耶不然漢石經出中郎之手後人必無能及者使其一無所損魏人必不重立則其殘闕可知然五六十年之間何以遂至殘闕則必遭董賊之禍無疑觀陸機洛陽記石經凡四十六碑毁者至二十有九此未經遷鄴之前已知此非遷鄴而沒於水也考獻帝西遷之後至陸機作記之前洛陽無大兵革其遭董賊之禍可知也獨恨陳壽魏志無一語言及而衛恆江式亦語焉不詳後人無由知其故爾乃衛江酈三人明言魏立三字石經而隋書經籍志及黃伯思董逌諸家則言魏立一字石經何相背之甚也然一字石經唐時尚存七經三十四卷則作志者必不妄言不知何以三字之外復有一字經黃伯思謂是鴻都一字石經夫漢石立於太學不在鴻都别立石經是有二石經矣漢書何以不言愚意石經必三體分書當高歡遷鄴時其二必沉於水其體幸存者乃魏之所立故作隋志者遂據此為言爾重刻石經遺文跋胡宗愈石經云者以俗儒穿鑿經籍疑誤後學而立也漢靈帝時博士試甲乙科爭第高下至有行賂改蘭臺漆書經字者諸儒受詔於熹平成刻於熹平光和俾天下咸取則焉碑高一丈廣四尺經注云立石太學其上悉刻蔡雍名隋志有今字石經七種其論云漢鐫七經皆蔡雍書史亦稱雍自書册使工鐫刻其書畫超詣要非蔡中郎不能到也然遺經今存者體各不同雖中郎兼備衆體而篇章之富未有能辦於一人之手傳雍與堂溪典楊賜馬日磾張馴韓説單揚等正經諸經意者當時諸儒同涉筆於其間不可知也然歷年多更變故久陵遷變煨燼剝蝕之餘甚有取為柱礎為炮石者唐初魏鄭公時訪求之十得其一况於今哉兹來少城得墜刻於一二故家雖間斷不齊然殘圭石璧亦可寶也因以鑱之錦官西樓庶幾補古之闕文云爾又內翰胡公以道德文章華我國家其經濟事業似唐李文饒而風節過之方論上前慷慨激烈動悟淵聽在玊堂鎖闥益攄所學禆贊聖德訂正國是被寵隆異冠絶在廷公每以天下自任惟六經精微寓諸日用至於屋壁所藏殘篇新刻收拾無遺常歎石經𨽻畫最古旁搜博訪合諸家所藏得蔡中郎石經四千二百七十字有奇以楷書釋之又得古文篆𨽻三體石經遺字八百一十九並鑱諸石永貽不朽按范曄史蔡雍自書册使工鐫刻酈道元注水經亦云光和六年立石於太學其上悉刻蔡雍名則大字石經出於一筆似無可疑若夫三體石經以儒林傳考之則其書已出於東漢時水經注乃云刻之魏正始中意者魏刻殆以補漢刻之遺亡耳漢石經遺字趙明誠金石録右漢石經遺字者藏洛陽及長安人家蓋靈帝熹平四年所立其字則蔡雍小字八分書也其後纍經遷徙故散落不存今所有者才數千字皆土壤埋沒之餘磨滅而僅存者爾按後漢書儒林傳敘云為古文篆𨽻三體者非也蓋雍所書乃八分而三體石經乃魏時所建也又按靈帝紀言詔諸儒正五經文字刻石立於太學門外雍傳乃云奏正定六經文字既已不同而章懷太子注引洛陽記所載有尚書周易公羊傳論語禮記今余所藏遺字有尚書公羊傳論語又有詩儀禮然則當時所立又不止六經矣洛陽記又云禮記碑上有諫議大夫馬日磾議郎蔡雍等名今論語公羊後亦有堂溪典馬日磾等姓名尚在據雍傳稱雍以經籍去聖久遠文字多謬俗儒穿鑿疑誤後學乃奏求正定自書於碑於是後儒晚學咸取正焉今兹石本既已磨滅而歲久轉寫日就訛舛以世所傳經書本校此遺字其不同者已數百言又篇第亦時有小異使完本具存則其異同可勝數耶然則豈不可惜也哉而後世學者於去古數千百歲之後盡絀前代諸儒之論欲以己之私意悉通其説難矣余既録為三卷又取其文字之不同者且列於卷末云按陸機洛陽記石經凡四十六碑毁者二十有九時未遭氐羌之亂何以致此至魏之四十八碑迄元魏孝昌之末猶完好如故雖數經遷徙遺迹多存故後人猶得見之若漢之全碑久已不獲見矣趙德甫輩因已未嘗見反詆漢書儒林傳為誤何其謬也生千載之後欲與前人目覩者爭是非將使誰信之哉記石經與今文不同黃伯思東觀餘論漢石經與今文不同者殊多今略記之書女毋翕侮成人今本女無侮老成人保后胥高保后胥戚女永勸憂汝誕勸憂女有近則在乃心今近作戕女比猶念以相從今作汝分猷各翕中各設中爾惠朕曷祗動萬民以遷爾謂朕曷震動天既付命今付作孚曰陳其五行今作汨陳嚴恭寅畏天命自亮以民祗懼今亮作度以作治惠保小人惠於矜寡今人作民于作鮮母兄曰無皇曰則兄自敬德兄作皇旦以前人之微言今作徽言是罔顯哉厥世今哉作在文王之鮮光今作耿光通殷就大命達殷作大命論語意與之與今意作抑孝于惟孝今于作乎朝聞道夕死可也今也作矣是魯孔丘與曰是是知津矣是魯孔丘與曰是也曰是知津矣耰不輟子路以告子憮然耰而不輟子路行以告夫子憮然置其杖而藝今置作植其斯以乎其斯而已矣譬諸宫牆今諸作之賈諸賈之哉今賈作沽又論語每篇各計其章數其最後云凡二十篇萬五千七百一十字又計諸異聞之語若曰在於蕭牆之內蓋毛包周於今論語無蓋氏毛氏書此石刻在洛陽本在洛宫前御史臺中年久摧散洛人好事者時時得之若騏驥一毛虬龍片甲今張燾龍圖家有十版最多張氏壻家有五六版王晉玉家有小塊洛中所有者止此豫皆得其拓本論語之末題云詔書與博士臣左立郎中臣書上臣下皆缺當是著書者姓名或云此即蔡雍書書姓名已亡無以辨之獨刻者陳興姓名甚完何其幸歟又有一版公羊不知誰氏所得其末云溪典諫議大夫臣馬日磾臣趙域議郎臣劉𢎞郎中臣張文臣蘇陵臣傅楨楨下溪上缺溪上當是堂謂堂溪典也此蓋鴻都一字石經然經各異手書不必皆蔡雍也三字者不見真刻獨此一字者乃當時所刻字畫高古精善殊可寶重開元中嘗藏拓本於御府以開元二字小印印之與法書名畫同藏蓋唐世以前未録前代石刻獨此見收其可寶如此蔡雍石經董逌廣川書跋經廢於世無所傳聞久矣當秦未滅詩書其學已失舊法世傳不可復求而得之况其在後世耶漢承秦亡雖起而盡收於溝渠炱音臺燼間然殘缺湮淪無復全學諸儒妄度聖人隨誤釋謬方將訓習章句不得其序其能得道之全以求聖人之意而不失哉至其不得於言則疑於經不得於經則疑於學師習各異黨學相伐至致滋荄周由等以就其學有不合者則私定漆音七書以應其誤獨蔡雍鐫刻七經著於石碑有所檢據隱括其失而周盡當時號鴻都三字其異文者附見此於已殘之經得收其遺逸而僅存其可貴也才三十年兵火繼遭碑亦損缺魏正始中又立一字石經相承以為七經正字後魏武定四年移洛陽漢魏石經於鄴魏末齊神武自洛陽徙於鄴都河陽河岸崩遂沒於水其得至鄴者殆不得其半周大象中詔徙鄴城石經於洛時為軍人破毁至有竊載還鄴者船壞沒溺不勝其衆也其後得者盡破為橋基隋開皇六年自鄴京載入長安置於祕書內省議欲補緝立於國學會亂遂廢營造之司用為柱礎貞觀初魏徴始收聚之十不一存其相承傳拓之本猶在祕府當時考驗至詳謂不盡為雍如馬日磾數輩相與成之然漢𨽻簡古深於法度亦後世不及故兼存之趙綽曰唐造防秋館時穿地多得石經故洛中人士逮今有之考當時所得已是漢世所遺沒而得者國初開地唐御史府得石經十餘石此又唐末淪沒之所出也石經尚書董逌廣川書跋祕書郎黃符以石經尚書示余為考而識之蔡雍以經籍去聖久遠文字多謬俗儒穿鑿疑誤後學熹平四年奏求正六經文字雍乃自書於碑大屋覆藏立太學門外號鴻都石經屋覆四面欄障開門於南河南郡設吏卒視之昔朱越石與兄書曰石經文都其碑高一丈許廣四尺駢羅相接太學在南明門外講堂長十丈廣三丈堂前石經四部本碑四十六枚元魏時西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉崩壞東行論語三碑毁禮記但存諫議大夫馬日磾議郎蔡雍名當是時尚有碑十八蓋春秋尚書作篆𨽻科斗復有周易尚書公羊禮記四部楊衒之曰石經尚書公羊為四部又謂春秋尚書二部書有二經當是古文已出衒之出北齊謂得四十八碑誤也洛陽昔得石經尚書段殘破不屬蓋盤庚洪範無逸多士多方總二百三十六字其文與今尚書盡同間有異者才十餘然則知古文尚書蓋已見於此或曰魏亦作石經安知此為漢所書哉余謂魏一字漢為三字此其得相亂耶且曰天命自度碑作亮惠鮮鰥寡碑作惠于矜寡乃逸既誕作乃憲既延治民祗懼作以民肆高宗享國五十九年作百年以書考之知傳受訛誤不若碑之正也方漢立學官書惟有歐陽夏侯其書雖不全見今諸家所引與古文尚書全異不應今所存古文反盡同也疑雍既立二書則或當以古文自存矣王肅解書悉是孔傳便知魏去漢世未遠肅得其文不然不應又盡同也晉內史梅賾分舜典而當時猶疑知古經已廢於漢魏不爾肅得自私使世疑耶余知至晉其書已絶今考杜預釋左傳以古文為逸書又知歐陽夏侯所傳殆異於古文其知者於此乎考之石經論語董逌廣川書跋石經今廢不存或自河南御史臺發地得之蓋論語第一篇并第十四篇為一碑亡其半矣其可識者字二百七十又自第十八篇至第二十篇為一碑破缺殘餘得五之一其存字為三百五十七以今文論語校之其異者若抑與之與為意與之我未見好仁者惡不仁者作未見好仁惡不仁朝聞道夕死可矣作可也有三年之喪于其父母無乎字惡居下流而無流字年四十而見惡焉無焉字鳯兮鳯兮作何德之衰往者不可諫也來者猶可追也今本皆異執輿為誰而作執車為誰子是魯孔丘與曰是然後曰是知津矣比今書多二字耰而不輟作輟夫子憮然植其杖作置其斯而已矣作其斯以乎子遊作子斿而在蕭牆之內作而在于蕭牆之內凡碑所存校其異者已十五之一矣使鴻都舊書盡存則其異可知也夫以雍之所定雖未盡善然漢儒學博其校定衆家得正訛誤多矣此猶是千載舊書比今兵火之餘師學已久廢其庸得並論耶石經尚書殘碑洪適𨽻釋命孔本作身何及相缺散孔作憸下闕言曰人惟舊孔舊上有求字下闕二字救孔作求舊下闕有志女毋翕侮人成毋流孔作汝無侮老成人無弱下遂缺各共爾事齊乃位度爾孔作乃口下闕民之承保后胥高孔作戚鮮以不浮下闕試以爾孔作汝遷安定厥國孔作邦􅀢孔無女不下闕其或迪孔作稽自怨孔作恕下闕永孔作誕勸憂今其有今罔後女何下闕之勞爾先豫不下缺于兹高后不乃知孔作崇降罪疾曰下闕能迪吉我先后下缺民女有近孔作戕則在我心我先后綏下缺興降不永于戲孔作崇降弗祥嗚呼今豫下闕絶遠女比猶孔作分猷念以相從各翕孔作設中下缺建乃家下缺股孔作盤缺一字既下缺衆曰女罔台民孔作無戲怠勗孔作懋建大命今我孔作豫下缺凶德綏孔作嘉績下缺今孔無爾惠孔作謂朕缺樁孔作震動萬民以遷肆上下缺乘孔作隱哉豫其勗孔作懋蕑相爾念敬我衆朕不已上盤庚三篇民中絶命民有不若德不聽罪天既孚孔作付已上高宗肜日篇厥遺任孔作壬父母弟不迪乃維四方下缺不愆于四伐五伐六伐七伐乃已上牧誓篇伊孔無鴻孔作洪水曰孔作汨陳其五行帝下缺曰建用皇極次六曰艾孔作乂用三德下缺潤下作醎炎上作苦曲直作下缺食二曰貨三曰祀四曰司空下闕極凡厥庶民無有涇司人無有下缺明人之有能有為使羞其行而下缺路無偏毋黨王道蕩蕩毋黨下缺為天下王三德孔三上有六一曰正直二下缺家而孔無凶于而國人用缺頗辟孔作僻下缺乃心􅀈及卿缺􅀈及庶民孔作人已上洪範篇維天命元孔元作無違朕不敢有下缺罪時維天命王曰告爾孔無二字多下缺兹雒孔作洛豫維四方􅘩攸責亦維爾下缺有年于兹雒爾小子乃興從爾遷王已上多士篇嗇孔作穡之艱難乃劮孔作逸乃憲孔作諺既延孔作誕不孔作否則侮厥下缺中宗嚴恭寅畏天命自亮以孔作度治民祗懼下缺或怨肆高宗之饗國百年孔作享國五十有九年自時厥後下缺功田功徽柔懿共懷保小人孔作民惠于矜孔作鮮鰥下缺酒孔作淫毋劮孔作逸于遊田維下缺共孔作無淫于觀于逸于逰于田以萬民惟正之供毋兄孔作無皇白今日下缺厥􅄇聖聖作聼人乃訓變孔變上有之乃亂正刑孔正上有先王之至于下缺則兄曰孔作皇自敬德厥愆曰朕之愆允下缺公曰於戲嗣王監于兹孔監上有其已上無逸篇道孔作終出于􅄇詳於戲君闕曰時我已上君奭篇我則致天之已上多方篇常伯常任辟孔作凖下缺亂孔無謀面用下缺于厥邑其在下缺有會孔作俊心以敬事下缺王維厥孔厥上有克度孔作宅心乃下缺受兹孔作此丕丕其孔作基於戲下缺旦以前孔作已受人之微孔作微言下缺訓德孔德上有于是罔顯哉孔作在厥世下缺王之鮮孔作耿光以楊武王已上立政篇几乃缺召太保下缺通孔作達殷就孔作集大命在下缺非幾兹即孔作既下闕黼衣孔作扆以上顧命篇右石經尚書殘碑盤庚篇百七十二字高宗肜日篇十五字牧誓篇二十四字洪範篇百八字多士篇四十四字無逸篇百三字君奭篇十一字多方篇五字立政篇五十六字顧命篇十七字合五百四十七字熹平四年議郎蔡雍所書者漢儒傳伏生尚書有歐陽大小夏侯之學孔安國尚書漢人雖有為之訓傳者然不立於學官永嘉之亂三家之書並亡故孔氏傳獨行以其書校石本多十字少二十一字不同者五十五字借用者八字鴻艾劮猶之類是也通用者十一字於戲母女之類是也孔氏敘商三宗以年多少為先後此碑獨闕祖甲計其字蓋在中宗之上以傳序為次也但云高宗饗國百年異爾范史云蔡雍以俗儒穿鑿經籍疑誤後學與堂溪典馬日磾等奏求正定六經文字時博士試甲乙科爭第高下至有行賂改蘭臺漆書經字者靈帝乃從諸儒之請刋石立之太學天下咸取則焉碑高一丈廣四尺陸機洛陽記云碑凡四十六書易公羊二十八碑其十二毁論語三碑其二毁禮記十五碑皆北齊徙之鄴都至河陽岸頺半沒於水隋復載入長安有易一卷書六卷魯詩六卷儀禮九卷春秋一卷公羊九卷論語一卷未及補治而亂作營繕者至用為柱礎唐初魏鄭公收聚之十不存一則石經之散亡久矣本朝一統時遺經斷石藏於好事之家猶崑山片玉已不多見今京華年代殷遙昔之殘碑日益鮮矣豫既集𨽻釋因以所有鑱之會稽蓬萊閣㔠音慉勉也亦逸字石經魯詩殘碑惟毛作維是褊心是以為刺葛屨下闕汾一曲言采其藚彼其之子美下闕之誰知闕一字毛誰上有其之蓋亦勿思園有棘其實之下闕父兮父闕一字毛旡曰嗟豫子行役夙夜毋毛作無已尚毛作上愼下闕哉猶來毋死陟岵三章章六句十下闕􅄇稼􅄇嗇毛作穡胡取禾三百廛兮􅄇下闕特兮彼君子兮不素食兮欿欿毛作坎伐輪兮下闕毋食我黍三歲宦毛作貫女莫我肯顧逝將去女下闕宧女莫我肯勞闕將去女適彼樂郊樂郊下闕蟋蟀在堂歲聿其逝今我不樂日月其闕句山有蓲毛作樞隰有榆子有衣裳弗曳下闕酒食胡毛作何􅄇日鼓瑟且以喜樂下闕既見君子云胡其憂楊下闕右石經魯詩殘篇碑百七十三字魏唐國風數篇之文也與毛詩異者如猗作兮貫作樞作蓲數字又有一段二十餘字零落不成文惟有叔于田一章及女曰雞八字可讀其間有齊韓字蓋敘二家異同之説猶公羊傳碑所云顏氏論語碑所云盍毛包周之比也漢代詩分為四在東京時毛氏詩不立學官隋志有石經魯詩六卷此碑既論齊韓于後則知隋志為然也石經儀禮殘碑東面主人下闕卒爵坐奠爵拜執下闕人盥洗升媵觚于賓下闕上拜受爵于筵前下闕首公答拜媵爵者立下闕媵爵者觶待于下闕公坐取大右石經儀禮殘碑四十五字皆大射儀之文也石磨滅字畫比他經不明白靈帝紀云詔諸儒正五經文字刻石立於太學蔡雍傳則云奏求正定六經記傳既已不同陸機洛陽記所載但有書易公羊禮記論語爾惟隋志云後漢刻七經於石碑皆蔡雍所書其目有一字經石經儀禮九卷乃漢史陸記之踈略也未央宫有曲臺殿天子射宫也西京無太學於此行禮故后蒼著書説禮數萬言名曰曲臺記今禁中有選德殿蓋便坐觀射之地而清間之燕咨訪治道率在於是殆與曲臺暗合古者射為六藝之一儀禮一經説射者兩篇後世非介胄之士則不習與古殊矣媵觚媵爵云者媵蓋送也石經公羊殘碑翬者何公子翬闕一字何以不稱公下闕柏于是謂柏曰吾為闕三字矣隱曰下闕之之辭也然則孰立之石缺二字之石踖板本作碏美大之之辭也棠者何濟闕一字之邑也曷為下闕仲子板本有也字桓未君則曷為祭仲子闕一字為桓立故下闕諸侯四諸公者何諸缺一字者何天子三公稱下闕相處乎內始缺一字諸公放板本作昉于此乎前此矣前下闕其成也曰吾成敗矣吾與鄭人未有成板本有也字吾下闕後為年外取邑不書此何以書久也下缺弟母兄稱兄凡缺五字之大夫也此下缺之邑也天子有闕四字諸侯皆從泰山下缺而葬不日卒赴而缺一字不告公曷為與微者下缺大夫之未命者也十年此公子翬也何下缺外于外大惡書小惡不書于內大惡諱小下闕國也何以不書葬隱之也何隱爾試板本作殺也試下缺葬板本有以為字􅄇繫缺一字臣子缺二字薨何以不地不忍言已上隱公何易之也易之則其下缺諱取周田也諱耴已上成公十有四年何以缺一字記異也何異下缺則至無王者則􅄇至有以告者曰有麕而下缺乎隱祖之所遝板作逮聞缺一字所見異辭所聞異辭所下缺不亦樂乎缺二字君子也制春秋之義以已上哀公有缺傳桓公二年顏氏有所見異辭所聞異下缺何以書記災也世年顏氏言君出則已入下缺顏氏無伐而不言圍者非取邑之辭也十下缺溪典諫議大夫臣馬日磾臣趙域議郎臣缺二字臣劉𢎞郎中臣張文臣蘇陵臣傅禎雜右石經公羊殘碑三百七十五字自隱公四年至成公元年及哀公十四年之文也所書者皆是公羊氏傳辭而無春秋正經又有顏氏説石文斷續不可考繹蓋嚴顏異同之辨也以今板本校之惟易四字爾漢注引陸機洛陽記云禮記碑上有馬日磾有堂溪典八人姓名論語碑亦有左立二人姓名陸氏所記未之詳也石經論語殘碑鮮矣不好犯上而好作下缺本本立缺一字道生孝下缺曰道千乘之國敬事下缺使民以時子曰弟子下缺而有信雖曰未學吾必謂下缺君子不重則不威學則下缺與意板本作抑豫之與子贛板本作貢曰夫子缺五字以得之夫子之求之也下缺道斯為美小大由之有所不行知缺五字禮節之亦不板本有可字行下缺告諸往而知來下缺人之不下缺章已上學而篇免而無恥道之以德齊之以下缺乎板本作于學世下缺孫問孝於我我對曰毋違樊遲缺一字何下缺曰生下缺葬之以禮祭下缺以别缺子夏問孝子曰色難有下缺勞有下缺孝下缺廋哉人焉廋板本有哉字子曰溫故而知下缺子下缺器子贛問下缺乎異端斯害也已子曰下缺曰何為則民服孔子對曰下缺之下缺子曰書云孝于板本作乎惟孝友于兄下缺也周因于殷禮所損益可知下缺已上為政篇曰人而不仁如禮何人而不仁如樂何林缺十一字與下缺與對曰不能子曰缺五字山不如林放缺九字也射下缺曰起豫板本有者字商也始可下缺子曰下缺殷禮吾下缺也知其説缺三字天下也其缺一字示諸斯乎下缺如神在下缺於二代郁郁乎下缺太廟下缺子知禮下缺禮下缺也下缺以柏周人以栗曰使民下缺往下缺國板本作邦君為兩君之好有反缺一字管氏下缺知禮下缺吾未嘗不得見也從者缺一字出曰下缺無道也久下缺觀之哉凡二十六章已上八佾篇人缺子曰苟志於仁矣無惡板本有也字子曰富與貴是人之所欲也下缺顛沛必於是子缺二字未見好仁板本有者字惡不仁者好仁者無以尚之下缺過也各於其黨缺二字斯知仁矣子曰朝聞道夕死可也板本作矣下缺子懷刑小人懷惠子曰放於利而行多怨子曰能以禮下缺曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已下缺曰父母在不遠遊遊必下缺已上里仁篇交於子張子缺一字曰子夏缺一字何對曰子夏曰可者缺四字者距板本作拒下缺子夏曰雖缺五字觀者焉致遠恐泥是以下缺其事君子學下缺子夏曰小人之過下缺曰下缺子夏曰大德缺五字出入可也子斿板本作遊缺六字子下缺君子之道焉可缺二字有缺一字有卒者其惟聖人下缺仕而下缺曾子曰吾聞諸板本有夫子子人未有自致也者板本作者也必也親喪乎缺一字子曰下缺如得其情則哀矜而勿喜子贛曰紂之缺一字善缺一字是其板本作之下缺贛曰仲尼焉學子贛曰文武之道未隧板本作墜於地在人賢者志其板本作識其下缺告子贛缺一字贛曰譬諸宫蘠諸板本作之蘠板本作牆賜之蘠缺一字窺見室家之好夫下缺尼􅄇可毁缺二字人之賢者丘陵也缺三字踰也仲尼日月也下缺一言以為不知言不可不愼也夫子之不可及也猶天之下缺已上子張篇不蔽簡在帝心朕躬有罪毋板本作無以萬方萬方有缺一字板本有兩罪字在朕躬下缺歸心焉所重民食喪缺一字寬則得衆敏則有功缺一字則説下缺不驕威而不猛乎缺一字曰何謂惠而不費子曰缺一字民之下缺尊其瞻視儼缺字而畏之斯不亦威而不猛乎下缺已上堯曰篇凡二十篇萬五千七百一缺一字字賈板本作沽諸賈之哉包周缺四字蓋肆乎其肆也缺一字周下缺曰言缺一字而在於蕭蘠之內盍毛包周無於下缺詔書與博士臣左立郎中臣孫表下缺工陳興刻右石經論語殘碑九百七十有一字前四篇後四篇之文也每篇必計其章終篇又總其字又載盍毛包周有無不同之説以今所行板本校之亦不至甚異其文有增損者其字亦有假借者及用古者有字異而訓不遠若置其杖賈之哉者漢人作文不避國諱威帝諱志順帝諱保石經皆臨文不易樊毅碑命守斯邦劉熊碑來臻我邦之類未嘗為高帝諱也此碑邦君為兩君之好何必去父母之邦尚書安定厥邦皆書邦作國疑漢儒所傳如此非獨遠避此諱也水經云光和六年立石於太學其上悉刻蔡雍名魏正始中又刻古篆𨽻三字石經蓋諸儒受詔在熹平而碑成則光和年也隋志有一字石經七種三字石經三種其論云漢鐫七經皆蔡書又云魏立一字石經其説自相矛盾新舊唐志有今字石經七種而注論語云蔡雍作又有三字石經古篆兩種蓋唐史以𨽻為今字也觀遺經字畫之妙非蔡中郎輩不能為以黃初後來碑刻比之相去不啻霄壤豈魏人筆力可到當以水經為據三體者乃魏人所刻儒林傳云為古文篆𨽻三體者非也史稱雍自書丹使工鐫刻今所存諸經字體各不同雖雍能分善𨽻兼備衆體但文字之多恐非一人可辦史云雍與堂溪典楊賜馬日磾張馴韓説單揚等正定諸經今公羊論語之後惟堂溪日磾二人姓名尚存别有趙域劉𢎞張文蘇陵傅禎左立孫表數人竊意其間必有同時揮毫者豫詳玩遺字公羊詩書儀禮又在論語上劉寬碑隂王􅋯題名則公羊詩書之雁行也黃初孔庿碑則論語之苗裔也識者當能别之石經跋張縯石經本末丞相洪公論載於𨽻釋詳矣洪公所未及者今粗見於此唐章懷太子引洛陽記注范曄漢書稱石經凡四十六碑及高澄遷此經於鄴通鑑所書為五十二碑自東漢歷魏晉宋數百年間洛陽數被兵此碑當有毁者其遷於鄴乃視洛陽記多六焉疑洛陽記未詳也碑製高一丈廣四尺六經文多必非四十六碑所能盡者宋常山公河南志稱石經凡七十三碑常山公博物洽聞歐陽文忠每以古今疑事咨之河南志所書必有據依矣後周伐齊毁碑以為炮石方高緯昏亂兩陳勝負之頃猶需孽婦一觀遂以其國輸後周復何有於石經則此碑之殘毁亦宜也貞觀考古止得石經數段其傳於今者亦可知其無幾矣蔡雍本傳稱雍自書丹於碑其言為何體書今世所傳皆以體𨽻至儒林傳序則云為古文篆𨽻三體書法以相參檢注言古文謂孔氏壁中書以縯考之孔壁所藏皆科斗文字孔安國當武帝之世已稱科斗書無能知者其承詔為尚書五十九篇作傳為𨽻古定不復從科斗古文雍獨安能具三體書法於安國之後二百年哉漢建武時杜林避地河西得古文尚書一軸諸儒共傳寶之一軸已為世所琛如此熹平距建武又幾載乃謂六經悉能為古文非事情也或者雍以三體參檢其文而書丹於碑則定為𨽻亦如孔安國之書傳耶儒林傳序疑字有誤者初雍正定六經與堂溪典數人同受詔今六經字體不一當是時書丹者亦不獨雍也姑識於末以俟博識之君子張習孔雲谷卧餘云孔安國書序云為𨽻古定更以竹簡寫之古定殊不可曉定字當是字字之訛言既以其所知者為𨽻其古字則更以竹簡寫之也附記於此按洛陽記言石經四十六碑此專指漢而言也水經注及洛陽伽藍記言堂西有四十八碑此專指魏而言也合之當得九十四碑洛陽記二十九碑已毁則存於後魏者當得六十五碑及高澄遷鄴多沒於河故止存五十二碑此合漢魏而總言之也張氏疑漢碑不當有五十二翻謂洛陽記為誤豈不知魏亦有石經乎後魏靜帝本紀武定四年明書徙漢魏石經於鄴張氏亦未之考乎其言周師伐齊毁碑以為炮石亦非也周師以承光元年正月癸巳圍鄴齊主即出奔鄴城當日即下周師未嘗攻齊人亦未嘗拒安得有毁為炮石之事此皆以意論古而不考當時事實者也學古編吾衍石經遺字碑會稽蓬萊閣翻本破缺磨滅不異古碑今亡矣按洪適𨽻釋云余既集𨽻釋因以所有石經遺字鑱之會稽蓬萊閣然則遺字碑洪氏所刋也其翻本不知出何人石經𨽻字顧炎武金石文字記余兩見此本一于鄒平張氏一于京師孫氏尚書盤庚篇三十餘字論語為政篇七十餘字堯曰篇三十餘字以視洪氏𨽻釋所存不過什之一而已按三體石經漢魏皆嘗立之熹平之立石見于後漢書靈帝紀蔡雍傳張馴傳儒林傳宦者傳正始之立石見于晉書衛恆傳而水經注則曰漢碑五經立于太學講堂前悉在東側碑上悉刻蔡雍等名魏正始中又立古篆𨽻三字石經魏初傳古文出邯鄲淳石經古文轉失淳法樹之于堂西石四十八枚廣三十丈洛陽伽藍記則曰堂前有三種字石經二十五碑表裏刻之寫春秋尚書二部作篆科斗𨽻三種字漢右中郎將蔡雍筆之遺迹也猶有十八碑餘皆殘毁復有石碑四十八枚表裏𨽻書寫周易尚書公羊禮記四部又讚學碑一所並在堂前章懷太子引雒陽記則曰講堂長十丈廣二丈堂前石經四部本碑凡四十六枚少二枚西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉崩壞東行論語三碑二碑毁禮記碑上有諫議大夫馬日磾議郎蔡雍名此皆當時親見其石而記之者也合而考之其不同有四焉一曰漢五六七經之不同二曰魏石經三體一體之不同三曰堂西所立石為魏為漢之不同四曰後魏所存石諸經之不同後漢書本紀儒林宦者傳皆云五經蔡雍張馴傳則以為六經隋書經籍志又以為七經此言漢五六七經之不同也衛恆傳言魏初傳古文者出于邯鄲淳至正始中立三字石經轉失淳法因科斗之名更效其形水經注亦云三字石經在堂西而伽藍記以為表裏𨽻書隋書經籍志則謂之一字石經矣然則所謂效科斗之形而失淳法者安在邪此言魏石經三體一體之不同也金石録曰漢石經蔡雍小字八分書後漢書儒林傳序云為古文篆𨽻三體者非也蓋蔡雍所書者乃八分而三體石經乃魏時所建也伽藍記二十五碑為三種字四十八碑表裏𨽻書水經注謂漢經在堂東側而四十八碑為魏經在堂西乃洛陽記不言東側有碑而云堂前有四十六枚上有馬日磾蔡雍名又不言字之有三體一體無乃并水經之所謂魏者而指之為漢歟此言堂西所立石為魏為漢之不同也伽藍記云周易尚書公羊禮記四部洛陽記則多一論語而趙明誠金石録言其家所收又有詩儀禮苟非其傳拓之本出于神龜以前則不應以宋人之所收而魏時猶未見也此言後魏所存石諸經之不同也凡此皆不可得而詳矣若夫魏書江式傳謂魏三字石經立于漢碑之西為邯鄲淳書則不考衛恆之言而失之者也胡三省通鑑注云魏碑以正始年中立漢書言元嘉元年度尚命邯鄲淳作曹娥碑時淳已弱冠自元嘉至正始九十餘年謂淳所書非也孝靜帝紀武定四年八月遷雒陽漢魏石經于鄴北齊書文宣帝紀言有五十二枚視伽藍記所列東二十五西四十八之數僅失二十一枚耳而隋書經籍志言河陽岸崩遂沒于水得至鄴者不盈大半則不考北齊之紀而失之者也周書宣帝紀大象元年二月辛卯詔徙鄴城石經于洛陽隋書于劉焯傳言開皇六年運洛陽石經至京師而經籍志則云自鄴載入長安則自不考其列傳而失之者也此皆其乖誤之易見者也又晉書裴頠傳曰轉國子祭酒奏修國學刻石寫經而水經注諸書無言晉石經者豈頠嘗為之而未成耶今此之本據宋黃長睿東觀餘論云本在洛宫前御史臺中年久摧散洛人好事者時時得之今張燾龍圖家有十版張氏壻家有五六版王晉玉家有小塊豫皆得其拓本邵伯溫聞見後録言近年洛陽張氏發地得石十數而董逌廣川書跋記尚書存二百三十六字論語存三百五十七字今此石已不知其何所歸而拓本之存于世者固往往而有也又衛恆四體書勢序曰自秦壞古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書許愼撰説文用篆書為正秦時李斯號為小篆諸山及銅人銘皆斯書也漢建初中扶風曹喜少異於李而亦稱善邯鄲淳師焉略究其妙漢末又有蔡雍采斯喜之法為古今雜形然精密間理不如淳也其所論者中郎之篆爾不言及𨽻以今推之漢人之所通行者𨽻也石經固有古文篆二體矣未知其出於何人若夫中郎之作𨽻者蓋隨俗為之欲人易曉而已若固不若許叔重之一點一畫皆有根柢也故唐李陽冰言蔡中郎以豐同豐按豐字自後漢三公山碑武都太守李翕西狹頌等碑多已作豐不始於中郎也李丞相將束為宋魯魚一惑涇渭同流而張參作五經文字每言上説文下石經石經之文大抵變而從省者也省者謂之𨽻其稍繁而雜篆法者謂之八分為八分者已不必能通六書之指矣故韓退之贈張祕書詩云阿買不識字頗知書八分而况於為𨽻為真以至於行草乎雖然古文之變而為篆又變而為𨽻也五經之異同變而歸于一也此勢之不得不然而中郎因適當其時者也顏氏家訓曰世間小學者不通古今必依小篆是正書記凡爾雅三蒼説文豈能盡得蒼頡本指哉亦隨代損益各有同異然則唐人試士必以石經説文字林者蓋欲其兼古今之法而曉變通之意乎按後漢書儒林傳及洛陽伽藍記並言漢立三字石經晉書衛恆傳後魏書江式傳及酈道元水經注並言魏石經亦然是兩朝石刻皆用古文篆𨽻三體無可疑矣乃隋書經籍志黃伯思東觀餘論董逌廣川書跋謂漢用三體魏止一體趙明誠金石録洪適𨽻釋則謂魏用三體漢止一體而詆後漢書為誤兩説矛盾如此將安適從愚謂儒林傳所言必不誣即楊衒之衛恆江式酈道元皆得之目覩豈有舛謬衒之之言曰漢石經二十五碑表裏刻之作篆科斗𨽻三種字皆蔡雍之筆儒林傳不言表裏皆刻賴此始知之其非妄言可知矣恆之言曰魏初傳古文出邯鄲淳正始中立三字石經轉失淳法因科斗之名遂效其形既有科斗則有𨽻篆可知矣當是時漢碑雖多殘毁而魏碑無所損諸儒生長洛陽觀覽已非一日安得反譏其誤由黃董趙洪諸子止見殘缺之餘未獲見其全文故各持一説而不相合夫生數百年後遙度數百年以前之事終不若目覩之真衛江諸公皆出於目覩惟宋以後文人未見真刻但考索于殘碑拓本曰此漢也此魏也不得其實而以意度之故有此紛紛之論其在於今石經遺字士大夫家多有之莫不誇為中郎真迹豈知宋之中世胡宗愈刻之於成都洪適刻之於會稽得之者何嘗不視為異寶而不知非其真也然則後人之疑漢疑魏豈若前人目覩之可據哉後魏石經南齊書魏鹵傳魏初平居平城無城郭佛狸即世祖太武帝拓拔燾始截平城西為宫城西南去白登山七里于城西三里刻石寫五經及其國記按佛狸在位歲久無歲不用兵乃能留意經籍刋勒于石此帝王盛事而後魏書不載獨見于南齊書不可不補入然以佛狸之驍雄嗜殺豈能愛好經術此必崔浩所為浩自祖父以來世擅書名於北土宜其有是美舉爾石經考卷上
