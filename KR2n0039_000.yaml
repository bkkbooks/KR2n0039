body:
  text: 石經考目録類二金石之屬提要臣等謹案石經考二卷國朝萬斯同撰斯同有廟制圖考已著錄石經沿革異同唐宋以來論者齟齬不一崑山顧炎武始輯諸家之説為石經考實有剙始之功斯同是編悉採炎武之說又益以吳任臣席益范成大吾衍董逌諸家之論并及炎武所作金石文字記亦間附以已見雖不若杭世駿石經考異之詳辨而視顧氏之書已為較備且炎武詳於漢魏而略於唐宋斯同則於唐宋石經引據特詳又斯同雖在世駿前而世駿作考異時未見此書故此書之所詳者考異或轉未之及要之合三家之書㕘互考證其事乃備固未可偏廢其一也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5f3f8fcccd6945bfd08b0e3063faf49a3a0618b6be5aeb5be9403a6797b120a8
